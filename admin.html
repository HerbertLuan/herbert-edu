<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Painel do Admin · Herbert Edu</title>
  <link rel="stylesheet" href="/src/estilo.css" />
  <link rel="stylesheet" href="/src/admin.css" />
</head>
<body class="admin-body">
  <!-- Tela de login -->
  <div id="login" class="login" hidden>
    <div class="login-card">
      <div class="login-marca">Herbert Edu</div>
      <p class="login-sub">Painel do administrador</p>
      <button id="btn-entrar" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 5 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 5 29.5 3 24 3 16 3 9.1 7.6 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 35.9 26.7 37 24 37c-5.3 0-9.7-2.6-11.3-6.9l-6.5 5C9.3 41.3 16.1 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.9 35.6 45 30.4 45 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
        Entrar com Google
      </button>
      <p id="login-msg" class="login-msg"></p>
      <a href="/" class="login-voltar">← Voltar ao site</a>
    </div>
  </div>

  <!-- Painel -->
  <div id="painel" class="painel" hidden>
    <header class="painel-topo">
      <div>
        <div class="painel-titulo">Painel do Admin</div>
        <div class="painel-user" id="painel-user"></div>
      </div>
      <div class="painel-acoes">
        <a href="/" target="_blank" class="btn ghost">Ver site ↗</a>
        <button id="btn-sair" class="btn ghost">Sair</button>
      </div>
    </header>

    <main class="painel-main wrap">
      <div class="barra-topo">
        <h2>Temas e materiais</h2>
        <button id="btn-novo-tema" class="btn">+ Novo tema</button>
      </div>
      <p class="dica">Reordene com ▲▼. Alterne <b>publicado</b> para mostrar/ocultar na home. As mudanças vão direto para o site.</p>
      <div id="lista" class="lista">
        <div class="estado"><span class="emoji">⏳</span> Carregando…</div>
      </div>
    </main>
  </div>

  <!-- Camada de mensagens (toast) -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
