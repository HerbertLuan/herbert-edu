<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Materiais de aula do preparatório ENEM — Herbert Edu" />
  <title>Herbert Edu — Materiais de Aula</title>
  <link rel="stylesheet" href="/src/estilo.css" />
</head>
<body>
  <div class="topo-acoes">
    <a href="/jogos.html" class="qr-btn" title="Minigames e desafios" aria-label="Minigames e desafios">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M7 8a5 5 0 0 0-5 5v.5A4.5 4.5 0 0 0 6.5 18c1.3 0 2.5-.55 3.35-1.5h4.3c.85.95 2.05 1.5 3.35 1.5A4.5 4.5 0 0 0 22 13.5V13a5 5 0 0 0-5-5H7zm-1 3h2v1h1v2H8v1H6v-1H5v-2h1v-1zm10.5 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm2 2.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
      </svg>
      <span>Jogar</span>
    </a>
    <button id="btn-qr" class="qr-btn" title="Mostrar QR code do site" aria-label="Mostrar QR code do site">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm10-2h2v2h-2v-2zm4 0h2v2h-2v-2zm-4 4h2v2h-2v-2zm2 2h2v2h-2v-2zm2-2h2v2h-2v-2zm0 4h2v2h-2v-2z"/>
      </svg>
      <span>QR</span>
    </button>
  </div>

  <header class="topo">
    <div class="marca">Herbert Edu</div>
    <div class="sub">Materiais de aula · Preparatório ENEM</div>
  </header>

  <div id="qr-modal" class="qr-modal" hidden>
    <div class="qr-card" role="dialog" aria-modal="true" aria-label="QR code do site">
      <button class="qr-fechar" id="qr-fechar" aria-label="Fechar">✕</button>
      <h2>Acesse pelo celular 📱</h2>
      <p class="qr-ajuda">Aponte a câmera para o código</p>
      <div id="qr-img" class="qr-img"></div>
      <p class="qr-url">herbert-edu.web.app</p>
    </div>
  </div>

  <main class="conteudo">
    <div class="wrap">
      <div id="catalogo">
        <div class="estado">
          <span class="emoji">⏳</span>
          Carregando materiais…
        </div>
      </div>
    </div>
  </main>

  <footer class="rodape">
    © <span id="ano"></span> Herbert Edu
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
